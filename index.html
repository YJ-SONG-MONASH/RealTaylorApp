<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Taylor's App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      overflow: hidden;
    }

    .phone-frame {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      height: 100vh;
    }

    .phone-frame img.bg {
      width: 100%;
      display: block;
    }

    .status-bar-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3.6%;
      background: #c41230;
      z-index: 2;
    }

    .name-input-wrapper {
      position: absolute;
      top: 10.2%;
      left: 10%;
      width: 80%;
      height: 3.5%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name-input-wrapper input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 4.2vw;
      font-weight: 500;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      caret-color: #fff;
    }

    @media (min-width: 480px) {
      .name-input-wrapper input {
        font-size: 20px;
      }
    }

    .name-input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .overlay-btn {
      position: absolute;
      z-index: 3;
      display: block;
      cursor: pointer;
      /* transparent, no visual indication */
      background: transparent;
      border: none;
      text-decoration: none;
    }

    .btn-virtual-id {
      top: 15.8%;
      left: 50%;
      width: 22%;
      height: 8.5%;
    }

    .btn-profile {
      top: 15.8%;
      left: 72%;
      width: 22%;
      height: 8.5%;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img class="bg" src="mainWindow.jpg" alt="Main Window">

    <div class="status-bar-cover"></div>

    <div class="name-input-wrapper">
      <input type="text" id="nameInput" value="Hello, Yuan Shengqi" placeholder="Hello, Your Name">
    </div>

    <a href="studentcard.html" class="overlay-btn btn-virtual-id" aria-label="Virtual ID"></a>
    <a href="profile.html" class="overlay-btn btn-profile" aria-label="Profile"></a>
  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const saved = localStorage.getItem('userName');
    if (saved) nameInput.value = saved;
    nameInput.addEventListener('input', () => {
      localStorage.setItem('userName', nameInput.value);
    });
  </script>
</body>
</html>
