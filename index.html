<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Taylor App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 16px;
    }

    .card {
      background: #1a1a2e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .card .caption {
      padding: 16px 20px;
      color: #e0e0e0;
      font-size: 14px;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="mainWindow.jpg" alt="Main Window">
      <div class="caption">Real Taylor App — Main Window</div>
    </div>
  </div>
</body>
</html>
