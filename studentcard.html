<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Student Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #c41230;
      overflow: hidden;
    }

    .phone-frame {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      height: 100vh;
    }

    .phone-frame img.bg {
      width: 100%;
      display: block;
    }

    .status-bar-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3.6%;
      background: #c41230;
      z-index: 2;
    }

    .back-btn {
      position: absolute;
      top: 3.6%;
      left: 0;
      width: 15%;
      height: 5.5%;
      z-index: 3;
      display: block;
      background: transparent;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img class="bg" src="studentCard.jpg" alt="Student Card">
    <div class="status-bar-cover"></div>
    <a href="index.html" class="back-btn" aria-label="Back"></a>
  </div>
</body>
</html>
